name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shopapp
          POSTGRES_PASSWORD: shopapp
          POSTGRES_DB: shopapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopapp -d shopapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://shopapp:shopapp@localhost:5432/shopapp?schema=public
      NEXTAUTH_SECRET: ci-test-secret-not-real
      NEXTAUTH_URL: http://localhost:3000
      LOG_LEVEL: error
      CRON_SECRET: ci-cron-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + PBT tests
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration
