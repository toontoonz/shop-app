context-summary:
  type: "Greenfield"
  stack: "Pending D3 decisions"
  architecture: "Pending D2/D3 decisions"
  feature: "Multi-seller e-commerce web app: anonymous buyer storefront with mock payment plus authenticated seller backend with order management and sales analytics."
