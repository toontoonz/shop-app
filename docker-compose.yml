services:
  postgres:
    image: postgres:16-alpine
    container_name: shop-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopapp
      POSTGRES_PASSWORD: shopapp
      POSTGRES_DB: shopapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopapp -d shopapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
